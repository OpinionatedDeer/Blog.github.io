baseURL = 'https://OpinionatedDeer.Blog.github.io/'
languageCode = 'en-us'
title = 'OpinionatedDeer Blog'
theme        = "hello-friend-ng"
pagination.paperSize = 10

enableRobotsTXT = true


[outputs]
home = ["html","RSS"]
taxonomy = ["html","RSS"]

[params]
    [params.Author]
        name = "OpinionatedDeer"
        email = "mriganshchaudhary@tutamail.com"
    dateform        = "2 Jan, 2006"
    dateformShort   = "2 Jan"
    dateformNum     = "02-01-2006"
    dateformNumTime = "02-01-2006 15:04"
    # Subtitle for home
    homeSubtitle = "Someone's blog i guess..."
    # Set disableReadOtherPosts to true in order to hide the links to other posts.
    disableReadOtherPosts = true
    # Enable sharing buttons, if you like
    enableSharingButtons = true
    # Show a global language switcher in the navigation bar
    enableGlobalLanguageMenu = true
    # Metadata mostly used in document's head
    description ="None"
    keywords = "homepage, blog"
    images = [""]

[taxonomies]
    category = "blog"
    tag      = "tags"
    series   = "series"

[languages]
    [languages.en]
        title =  "Stop waiting. If you're free, do it. Don't waste your life living through someone else's story."
        keywords = ""
        copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
        readOtherPosts = "Read other posts"

    [languages.en.params]
        subtitle  = "Really you should do something else..."

        [languages.en.params.logo]
        logoText = "Ignore this website"
        logoHomeLink = "/"
        # or
        #
        # path = "/img/your-example-logo.svg"
        # alt = "Your example logo alt text"

    # And you can even create generic menu
    [[menu.main]]
        identifier = "blog"
        name       = "Blog"
        url        = "/posts"

    # # and submenus
    # [[menu.main]]
    #     identifier  = "parent"
    #     name        = "Parent"
    #     url         = "/parent"
    #     hasChildren = true
    #
    # [[menu.main]]
    #     identifier  = "child"
    #     name        = "Child"
    #     url         = "/parent/child"
    #     parent      = "parent"
